name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev

      - name: Configure (Release)
        run: cmake -G Ninja -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-release --config Release --parallel

      - name: Run tests
        run: ./cmake-build-release/proc_input_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KrunkNative-linux-x86_64
          path: |
            cmake-build-release/client_bin
            cmake-build-release/server_bin
          if-no-files-found: error

  windows:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Configure (Release)
        run: cmake -G Ninja -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-release --config Release --parallel

      - name: Run tests
        run: ./cmake-build-release/proc_input_test.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KrunkNative-windows-x86_64-mingw
          path: |
            cmake-build-release/client.exe
            cmake-build-release/server.exe
          if-no-files-found: error
