name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libwayland-dev \
            wayland-protocols \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev

      - name: Configure (Release)
        run: cmake -G Ninja -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-release --config Release --parallel

      - name: Run tests
        run: ./cmake-build-release/proc_input_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KrunkNative-linux-x86_64
          path: |
            cmake-build-release/client_bin
            cmake-build-release/server_bin
          if-no-files-found: error

  windows:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Configure (Release)
        run: cmake -G Ninja -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-release --config Release --parallel

      - name: Run tests
        run: ./cmake-build-release/proc_input_test.exe

      - name: Stage Windows artifact (exes + runtime DLLs)
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp -v cmake-build-release/client.exe dist/
          cp -v cmake-build-release/server.exe dist/

          echo "=== ldd dist/client.exe ==="
          ldd dist/client.exe || true
          echo "=== ldd dist/server.exe ==="
          ldd dist/server.exe || true

          # Recursively resolve MinGW DLL dependencies of the exes and copy
          # everything that lives under the MSYS2 prefix (mingw64/ucrt64) into
          # the artifact dir. Without this, end-users hit "libbrotlidec.dll /
          # libbz2-1.dll not found" errors because FreeType pulls in brotli,
          # bzip2, harfbuzz, png, zlib, etc. at runtime.
          #
          # `ldd` on MSYS2 emits Windows-style absolute paths like
          # `D:/a/_temp/msys64/mingw64/bin/libfoo.dll`, so we match on the
          # `/mingw64/bin/` or `/ucrt64/bin/` substring rather than a leading
          # slash. System DLLs under C:/WINDOWS are skipped automatically.
          resolve_deps() {
            target="$1"
            seen_file="$2"
            depth="${3:-0}"
            indent=$(printf '%*s' "$((depth * 2))" '')
            echo "${indent}-> resolving deps of $target"
            deps=$(ldd "$target" 2>/dev/null \
              | awk '{print $3}' \
              | grep -Ei '/(mingw64|ucrt64)/bin/' || true)
            if [ -z "$deps" ]; then
              echo "${indent}   (no MinGW deps)"
              return 0
            fi
            echo "$deps" | while read -r dll; do
              [ -z "$dll" ] && continue
              name="$(basename "$dll")"
              if grep -qx "$name" "$seen_file" 2>/dev/null; then
                echo "${indent}   skip  $name (already bundled)"
              else
                echo "$name" >> "$seen_file"
                echo "${indent}   copy  $name  <-  $dll"
                cp -n "$dll" dist/
                resolve_deps "$dll" "$seen_file" "$((depth + 1))"
              fi
            done
          }

          : > dist/.seen
          resolve_deps dist/client.exe dist/.seen
          resolve_deps dist/server.exe dist/.seen
          rm -f dist/.seen

          echo "=== Final artifact contents ==="
          ls -la dist/
          echo "=== Bundled DLL count ==="
          ls -1 dist/*.dll 2>/dev/null | wc -l || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KrunkNative-windows-x86_64-mingw
          path: dist/**
          if-no-files-found: error

  macos:
    name: macOS (Clang)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config

      - name: Configure (Release)
        run: cmake -G Ninja -B cmake-build-release -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-release --config Release --parallel

      - name: Run tests
        run: ./cmake-build-release/proc_input_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KrunkNative-macos-${{ matrix.arch }}
          path: |
            cmake-build-release/client_bin
            cmake-build-release/server_bin
          if-no-files-found: error
